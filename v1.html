
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SONGHO - V1 LOCAL PVP</title>
    <style>
        :root { --neon-green: #00ff9d; --neon-red: #ff3366; --neon-gold: #ffb700; --bg-dark: #060609; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 20px; text-align: center; }
        .game-container { display: flex; flex-direction: column; align-items: center; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 2.3rem; text-transform: uppercase; color: var(--neon-green); letter-spacing: 4px; margin: 0; text-shadow: 0 0 15px var(--neon-green); }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 1px; }
        .live-ticker { width: 100%; background: #11111e; border-left: 4px solid var(--neon-gold); padding: 12px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; min-height: 24px; color: var(--neon-gold); text-align: left; box-sizing: border-box; }
        .score-board { display: flex; justify-content: space-between; width: 100%; margin-bottom: 20px; gap: 20px; }
        .card { flex: 1; background: #0f0f1a; border: 1px solid #222; padding: 15px; border-radius: 12px; text-align: left; transition: all 0.3s; }
        .card.active { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,157,0.15); }
        .card h2 { margin: 0 0 5px 0; font-size: 0.9rem; color: #888; text-transform: uppercase; }
        .score-val { font-size: 2.3rem; font-weight: 900; }
        .board { background: linear-gradient(145deg, #1f120c, #2e1a11); padding: 35px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 4px solid #3d2316; width: 100%; box-sizing: border-box; }
        .row { display: flex; justify-content: space-around; margin: 15px 0; }
        .case { width: 85px; height: 85px; background: #e3d5ca; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #2e1a11; font-weight: 900; font-size: 1.6rem; cursor: pointer; transition: all 0.2s; border: 4px solid #b5a093; box-shadow: inset 0 6px 12px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.4); }
        .case:hover { transform: scale(1.1) translateY(-4px); background: #fff; border-color: var(--neon-green); box-shadow: 0 0 20px var(--neon-green); }
        .case.disabled { cursor: not-allowed; pointer-events: none; opacity: 0.35; filter: grayscale(50%); }
        .label { font-size: 0.7rem; color: #7f6a5f; font-weight: bold; margin-top: 4px; }
        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        button { background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green); padding: 14px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; font-size: 0.85rem; }
        button:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Songo Arena</h1>
        <div class="subtitle">Version 1 : Duel Local Face-à-Face</div>
        <div class="live-ticker" id="ticker">Partie initialisée. Au joueur SUD de commencer.</div>
        <div class="score-board">
            <div class="card" id="card-NORD">
                <h2>Joueur NORD</h2>
                <div class="score-val" id="score-nord">0 <span style="font-size:1rem; color:#444;">/ 40</span></div>
            </div>
            <div class="card active" id="card-SUD">
                <h2>Joueur SUD</h2>
                <div class="score-val" id="score-sud">0 <span style="font-size:1rem; color:#444;">/ 40</span></div>
            </div>
        </div>
        <div class="board">
            <div class="row" id="row-nord"></div>
            <div class="row" id="row-sud"></div>
        </div>
        <div class="controls">
            <button id="reset-btn" onclick="resetGame()">Réinitialiser la table</button>
        </div>
    </div>
    <script>
        let board = Array(14).fill(5);
        let scoreSud = 0, scoreNord = 0;
        let currentPlayer = "SUD";
        let isAnimating = false;
        let audioCtx = null;

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            try {
                initAudio(); if (!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination); const now = audioCtx.currentTime;
                if (type === 'pickup') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(140, now); osc.frequency.exponentialRampToValueAtTime(380, now + 0.08);
                    gainNode.gain.setValueAtTime(0.4, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.12); osc.start(now); osc.stop(now + 0.12);
                } else if (type === 'drop') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.04);
                    gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.04); osc.start(now); osc.stop(now + 0.04);
                } else if (type === 'capture') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(350, now); osc.frequency.setValueAtTime(440, now + 0.06); osc.frequency.setValueAtTime(660, now + 0.18);
                    gainNode.gain.setValueAtTime(0.25, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.35); osc.start(now); osc.stop(now + 0.35);
                }
            } catch (e) {}
        }

        function isStarving(player) {
            let min = (player === "SUD") ? 0 : 7; let max = (player === "SUD") ? 6 : 13;
            for (let i = min; i <= max; i++) { if (board[i] > 0) return false; }
            return true;
        }

        function renderBoard() {
            document.getElementById('reset-btn').disabled = isAnimating;
            const rNord = document.getElementById('row-nord'); rNord.innerHTML = '';
            for (let i = 7; i <= 13; i++) {
                const c = document.createElement('div');
                const dis = (currentPlayer !== 'NORD' || isAnimating || board[i] === 0);
                c.className = `case ${dis ? 'disabled' : ''}`; c.id = `case-${i}`;
                c.innerHTML = `${board[i]}<div class="label">N${i-6}</div>`;
                if (!dis) c.onclick = () => playTurn(i);
                rNord.appendChild(c);
            }
            const rSud = document.getElementById('row-sud'); rSud.innerHTML = '';
            for (let i = 6; i >= 0; i--) {
                const c = document.createElement('div');
                const dis = (currentPlayer !== 'SUD' || isAnimating || board[i] === 0);
                c.className = `case ${dis ? 'disabled' : ''}`; c.id = `case-${i}`;
                c.innerHTML = `${board[i]}<div class="label">S${i+1}</div>`;
                if (!dis) c.onclick = () => playTurn(i);
                rSud.appendChild(c);
            }
            document.getElementById('score-sud').innerHTML = `${scoreSud} <span style="font-size:1rem; color:#444;">/ 40</span>`;
            document.getElementById('score-nord').innerHTML = `${scoreNord} <span style="font-size:1rem; color:#444;">/ 40</span>`;
            document.getElementById('card-SUD').className = `card ${currentPlayer === 'SUD' ? 'active' : ''}`;
            document.getElementById('card-NORD').className = `card ${currentPlayer === 'NORD' ? 'active' : ''}`;
            checkEndGame(false);
        }

        async function playTurn(index) {
            if (isAnimating || board[index] === 0) return;
            isAnimating = true; renderBoard();

            if ((index === 0 && currentPlayer === "SUD" && board[0] <= 2) || (index === 13 && currentPlayer === "NORD" && board[13] <= 2)) {
                let seeds = board[index]; board[index] = 0;
                if (currentPlayer === "SUD") scoreNord += seeds; else scoreSud += seeds;
                document.getElementById('ticker').innerText = "⚠️ Règle Case 7 appliquée ! Pions concédés.";
                isAnimating = false; switchPlayer(); return;
            }

            let seeds = board[index]; board[index] = 0;
            playSound('pickup'); renderBoard();
            let src = document.getElementById(`case-${index}`);
            if (src) { src.style.background = "var(--neon-red)"; src.style.color = "#fff"; src.style.boxShadow = "0 0 25px var(--neon-red)"; }
            await sleep(500);

            let curr = index;
            while (seeds > 0) {
                curr = (curr + 1) % 14; if (curr === index) continue;
                board[curr]++; seeds--; playSound('drop'); renderBoard();
                let cell = document.getElementById(`case-${curr}`);
                if (cell) { cell.style.background = "var(--neon-green)"; cell.style.color = "#000"; cell.style.transform = "scale(1.15)"; cell.style.boxShadow = "0 0 25px var(--neon-green)"; }
                await sleep(350);
            }

            renderBoard();
            let finalCell = document.getElementById(`case-${curr}`);
            if (finalCell) { finalCell.style.background = "var(--neon-gold)"; finalCell.style.color = "#000"; finalCell.style.transform = "scale(1.2)"; finalCell.style.boxShadow = "0 0 30px var(--neon-gold)"; }
            await sleep(600);

            executeHarvest(curr); isAnimating = false; switchPlayer();
        }

        function executeHarvest(lastIndex) {
            let min = (currentPlayer === "SUD") ? 7 : 0; let max = (currentPlayer === "SUD") ? 13 : 6;
            if (lastIndex < min || lastIndex > max) return;
            let curr = lastIndex; let captured = 0; let cells = [];
            while (curr >= min && curr <= max) {
                if (curr === min && curr === lastIndex) break;
                if (board[curr] >= 2 && board[curr] <= 4) { captured += board[curr]; cells.push(curr); curr--; } else break;
            }
            let totalEnemy = 0; for (let i = min; i <= max; i++) totalEnemy += board[i];
            if (captured === totalEnemy && totalEnemy > 0) { document.getElementById('ticker').innerText = "🚫 Famine Interdite !"; return; }
            if (captured > 0) {
                cells.forEach(i => board[i] = 0);
                if (currentPlayer === "SUD") scoreSud += captured; else scoreNord += captured;
                playSound('capture'); document.getElementById('ticker').innerText = `🔥 Prise magistrale de +${captured} graines !`;
            }
        }

        function switchPlayer() {
            currentPlayer = (currentPlayer === "SUD") ? "NORD" : "SUD";
            if (isStarving(currentPlayer)) {
                let opp = (currentPlayer === "SUD") ? "NORD" : "SUD";
                if (isStarving(opp)) { renderBoard(); setTimeout(() => { checkEndGame(true); }, 600); return; }
                currentPlayer = opp;
            }
            renderBoard();
            document.getElementById('ticker').innerText = `C'est au tour de [Joueur ${currentPlayer}].`;
        }

        function checkEndGame(forced = false) {
            let rem = board.reduce((a,b)=>a+b,0);
            if (scoreSud >= 40 || scoreNord >= 40 || rem < 10 || forced) {
                let w = scoreSud > scoreNord ? "SUD" : (scoreSud < scoreNord ? "NORD" : "Égalité");
                alert(`🏆 FIN DE PARTIE : Le joueur ${w} gagne !`); resetGame();
            }
        }
        function resetGame() { board = Array(14).fill(5); scoreSud = 0; scoreNord = 0; currentPlayer = "SUD"; isAnimating = false; renderBoard(); }
        renderBoard();
    </script>
</body>
</html>
